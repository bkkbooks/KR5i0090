道真經告諸仙曰吾今為汝略啓身心明宣道要十方得道神仙皆從此經修行而通微奧善男子善女人依憑齊戒作是津梁一切有為顯諸真路體此法相乃可受持能屏衆緣永除染著外想不入內想不出於正念中乃得五臟清涼六腑調泰三百六十骨節之閒有諸滯礙十惡之業百八十煩惱之業衆苦罪緣悉皆除蕩即引太和真氣注潤身田五臟六腑心目內觀真氣所有清淨光明虛白朗曜杳杳冥冥內外無事昏昏默默正達無為古今常存總持靜念從茲解悟道力資扶法藥相助仍節飮食驅遣鬼尸安寂六根靜照八識空其五藴證妙三元得道成真自然升度爾時諸天仙衆上白天尊言自從無始以來至於今日未聞如是大乘經典我等緣茲幸會廣及一切道果圓明而說偈曰杳杳冥冥清靜道昏昏默默太虛蹤體性湛然無所住色心都寂一真宗太上洞玄靈寶救苦妙經爾時救苦天尊遍滿十方界常以威神力救拔諸衆生得離於迷塗衆生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死戶初發玄元始以通祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙紫雲覆黃老是名三寶君還將上天氣以制九天魂救苦諸妙神善現救苦時天上混無分天氣歸一身皆成自然人自然有則體本在空洞中空洞寂非寂遍體皆虛空第一委氣立第二順氣生第三成萬法第四生光明天上三十六地下三十六太玄無邊際妙哉大洞經皈命太上尊能消一切罪東方玉寶皇上天尊南方玄真萬福天尊西方太妙至極天尊北方玄上玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方真皇洞神天尊道言十方諸天尊其數如沙塵化形十方界普濟度天人委氣聚功德同聲救罪人罪人實可哀我今說妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成清署劍樹化為騫上登朱陵府下入開光門超度三界難徑上元始天於是飛天神王無鞅聖衆瞻仰尊顏而作頌曰天尊說經教接引於羣生勤修學無為悟真道自成不迷亦不荒無我亦無名朗誦罪福句萬遍心垢清爾時飛天神王及諸仙衆說是頌畢稽首天尊奉辭而退太上道君說解𡨚拔罪妙經爾時太上道君與諸聖衆在八騫林下七寶臺中羅列威儀敷陳道要怡神默坐於玉京山放七寶光明照福堂地獄見福堂之內男女善人快樂無為逍遙自在復見諸地獄之中饑鬼窮魂以日繼夜受種種苦惱悉無人形五體壞爛饑餐猛火渴飲鎔銅足履刀山身負鐵杖遍體流血悲號徹天是時會中有一真人名曰廣信從座而起稽首前進上白道君曰不審此輩窮魂生有何咎而受茲苦道君曰受諸罪者在世之時不敬三光欺負神理十惡五逆不忠不仁不慈不孝毁傷物命殺害衆生福盡夀終當受斯苦是時廣信真人心生哀憫欲施濟拔幸望妙力威光許令開度伏䝉道君垂賜金言廣設法要為諸衆生演說是經名曰解𡨚拔罪流布於世利益存亡若有善男子善女人一心專志入靜持齊焚香行道六時轉念是經吾當隨願保佑其人使宿世𡨚讐乘福超度幽魂苦爽各獲超升真人廣信歡喜再拜覼縷勝因而作頌曰偉哉大道君常普無量功舟楫生死海濟度超羅酆罪對不復遇福報與冥通威神安可測讚之焉能窮是時廣信真人與諸聖衆聞法將畢各各稽首皈依信受奉行太上玄靈斗姥大聖元君本命延生心經老君曰斗姥上靈光圓大天寶月中有騫樹色瑩琉璃玉兔長生搗煉大藥凡天地氣運休否日月星辰錯行雨暘晦明不時風寒暑濕不節亢旱水火疫癘凶灾至如刀兵蟲蝗妖精鬼怪疾病傷生爭訟橫撓種種不祥悉皆乖氣所致斗姥降以大藥普垂醫治之功燮理五行升降二氣解滯去窒破暗除邪愆期者應期失度者得度安全胎育治療病疴潤益根荄暢回氣候生成人物煉度鬼魂散禳百結資補八陽輔正全真召和延祚位尊斗姥職重天醫生諸天衆月之明為北斗衆星之母斗為之魄水為之精主生人身光凝性水衆水一月衆月一光有情無情均秉靈光道氣一一資其生養獲衛恩深德重皆莫能知是以人生面有七竅內應乎心魄有七真受魄於斗斗姥尊號曰九靈太妙白玉龜臺夜光金精祖母元君又曰中天梵氣斗姥元君紫光明哲慈惠太素元君金真聖德天尊又化號大圓滿月光王又曰東華慈救皇君天醫大聖應號不一主治中天寶閣祖劫在玄明真淨天修行玄靈妙道勤奉元始至尊慧香氤氲智燈朗耀每發至願願生聖子補裨造化統制乾坤願力堅固終始如一因沐浴於九曲華池中湧出白玉龜臺神獬寶座斗姥登於寶座之上怡養神真修煉精魄沖然攝氣氣入玄玄運合靈風紫虛蔚勃果證玄靈妙道放無極微妙光明洞徹華池化生金蓮九苞經人閒七晝夜其華池中光明愈熾愈盛其光一時上騰九華天中化成九所大寶樓閣寶樓閣之中混凝九真梵氣自然成章文曰鬼尊鬼帝鬼摩鬼尼鬼達𩳓魁鬼鉢鬼叱前有天罡光敷祕字文曰螭音癡鬼爾音其芒角炓音了然是九章生神應現九皇道體一曰天皇二曰紫微三曰貪狼四曰巨門五曰祿存六曰文曲七曰廉貞八曰武曲九曰破軍天皇紫微尊帝二星居斗口娑羅上宫真光大如車輪得見之者身得長生位證真仙永不輪轉二星分作餘暉為左輔右弼為擎羊陀羅神化無方總領玄黃正氣七元星君斡運陰陽造化功霑三界德潤羣生其功德力不可思議夫修煉九還七返大丹者持此頓悟玄關靈光現前三十九節自然生榮了證太玄三一之道知守本來具足之理堅固真身更能精修大定乃至形神俱妙與道合真飛升玉京逍遙自在如此則劫劫生生玄祖宗親皆得解脫同受玄恩濟度存亡此為深妙皈心持奉靜處璿璣內景無漏於六根外景不淪於萬有湛然清淨道在目前頂禮真形恭敬咒曰玄靈節榮永保長生太玄三一守其真形五臟神君各得安寧魁𩲃𩵄䰢魓𩳐魒鬼旭鬼呼急急如律令柳祖回向文伏以大道開天妙樞啓乾坤之祕玄宗肇始靈機握主宰之元九宸於以司衡十極因之定位由是而三才立由是而萬法生逮太上化起乎東華為道門首出之北祖正陽嗣響冠八洞之仙班吕帝垂慈開兩宗之法派南推五祖北有七真稽仙系於寶笈琅函震愚迷以晨鐘暮鼓緬懷崇範敬𤑔心香伏念兆等根塵未解動結愆尤聲色甫逢每生貪染脫非三洞之真文何洗多生之夙垢茲幸棲身常住仰對至尊悟幻軀之無常急覓真常之路信長生之可學力臻絶學之奇道誡為先何堪錯步時光易逝幸早回頭一志常持定吉祥兮止止三時朝禮恆晝夜以行行所祈障礙滌除功修圓滿真光普照道果速成永守一編允矣天仙祕典留傳萬世慈哉妙道心鐙為上良因再申稱念太乙救苦天尊八十一聲純陽妙道天尊八十一聲一願風調雨順二願五穀豐登三願皇王萬歲四願國土清平五願民安物阜六願福夀康寧七願灾消禍散八願水火無侵九願聰明智慧十願學道成真十一願諸神擁護十二願亡者超升四生六道一切含靈聞經聽法總得超升願滅三障諸煩惱願得智慧真明了普願災障悉消除世世常行無上道罪從心起將心滅心若滅時罪亦亡罪亡心滅兩俱空是則名為真懴悔至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨真一不二法門大悲大願大聖大慈先天教主元始天尊至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨真一不二法門大悲大願大聖大慈玄中教主靈寶天尊至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨真一不二法門大悲大願大聖大慈混元教主道德天尊收讚時分二六功滿日中吉祥智果妙飛翀祕密在真空古觀高崇大道合蒼穹大聖回光普照大天尊三稱三皈自皈依道當願衆生常侍天尊永脫輪回自皈依經當願衆生生生世世得聞正法自皈依師當願衆生學最上乘不落邪見
