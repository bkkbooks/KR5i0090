front:
  text: 清微宏範道門功課重刋道藏輯要
  hash: sha256:571077b396bc63bd1cf211e65ed5b2d5647f957cdd98b9bd78ce38ada4a80968
  markers:
  - {type: page-break, offset: 8, content: '', id: CK-KZ_KR5i0090_02p001a}
body:
  text: 道門功課宏教真人柳守元撰早壇功課香讚蓬瀛朝爽參禮諸天玉清初日鏡光圓曉氣藹祥煙祕典心宣入道冀成仙太上無極三寶大天尊三稱開經偈琳琅振響中界肅清河海靜默山嶽吞雲萬靈拱伏召請羣真天無凶穢地鮮妖氛空明洞慧上達玉京常清常靜天尊三稱真心清靜道為宗譬彼中天寶月同淨掃迷雲無點翳一輪光滿太虛空上藥身中神氣精人人具足匪虧盈能知混合回風道金鼎黃芽日日生一炷真香本自然黃庭爐內起祥煙空中結就浮雲篆上祝當今夀萬年萬古道為尊宏開濟世門煌煌昭大法聖典至今存淨心神咒太上台星應變無停驅邪縛魅保命護身智慧明淨心神安寧三魂永久魄無喪傾急急如律令淨口神咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神却邪衛真喉神虎賁氣神引津心神丹元令我通真思神鍊液道氣常存急急如律令淨身神咒靈寶天尊安慰身形法子魂魄五臟玄冥青龍白虎隊仗紛紜朱雀玄武侍衛我真急急如律令安土地神咒元始安鎮普告萬神嶽瀆真官土地祇靈左社右稷不得妄驚回向正道內外澄清各安方位備守壇庭太上有命搜捕邪精護法神王保衛誦經皈依大道元享利貞急急如律令淨天地神咒天地自然穢氣分散洞中玄虛晃朗太元八方威神使我自然靈寶符命普告九天乾羅怛那洞罡太玄斬妖縛邪度人萬千中山神咒元始玉文持誦一遍却病延年按行五嶽八海知聞魔王束首真聖衛軒凶穢消散道德成全急急如律令金光神咒天地玄宗萬氣本根廣修億劫證吾神通三界內外惟道獨尊體有金光覆映吾身視之不見聽之不聞包羅天地養育羣生受持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹𩆝雷神隱名洞慧交徹五氣騰騰金光速現覆護真人急急如律令祝香神咒道由心洽心假香傳香爇玉爐心存帝前真靈下盼仙斾臨軒令臣關告徑達九天玄藴咒雲篆太虛浩劫之初乍遐乍邇或沈或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有冥冥其無誦咒能醫病持經可出塵利幽堪脫苦了願得成真玉清元始天尊說升玄消灾護命妙經稽首皈依衆妙道至心恭敬二玄真今運一心心所禮粗識此經經所因空色色空存本性有無無有色空均慧風出自天尊力掃除心界不遺塵唯願神光常擁護證盟今日守心人今日守心何所證不失凡身得道身爾時元始天尊在七寶林中五明宫內與無極聖衆俱放無極光明照無極世界觀無極衆生受無極苦惱宛轉世閒輪回生死漂浪愛河流吹欲海沉滯聲色迷惑有無無空有空無色有色無無有無有有無有終始暗昧不能自明畢竟迷惑天尊告曰汝等衆生從不有中有不無中無不色中色不空中空非有為有非無為無非色為色非空為空空即是空空無定空色即是色色無定色即色是空即空是色若能知空不空知色不色名為照了始達妙音識無空法洞觀無礙入衆妙門自然解悟離諸疑網不著空見清淨六根斷諸邪障我即為汝說是妙經名曰護命濟度衆生傳教世間流通誦讀即有飛天神王破邪金剛護法靈童救苦真人金精猛獸各百億萬衆俱侍衛是經隨所擁護捍厄扶衰度一切衆生離諸強著爾時天尊即說偈曰視不見我聽不得聞離種種邊名為妙道太上老君說常清靜經老君曰大道無形坐育天地大道無情運行日月大道無名長養萬物吾不知其名強名曰道夫道者有清有濁有動有靜天清地濁天動地靜男清女濁男動女靜降本流末而生萬物清者濁之源動者靜之基人能常清靜天地悉皆歸夫人神好清而心擾之人心好靜而欲牽之常能遣其欲而心自靜澄其心而神自清自然六欲不生三毒消滅所以不能者為心未澄欲未遣也能遣之者內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟唯見於空觀空亦空空無所空所空既無無無亦無無無既無湛然常寂寂無所寂欲豈能生欲既不生即是真靜真常應物真常得性常應常靜常清靜矣如此清靜漸入真道既入真道名為得道雖名得道實無所得為化衆生名為得道能悟之者可傳聖道老君曰上士無爭下士好爭上德不德下德執德執著之者不名道德衆生所以不得真道者為有妄心既有妄心即驚其神既驚其神即著萬物既著萬物即生貪求既生貪求即是煩惱煩惱妄想憂苦身心便遭濁辱流浪生死常沈苦海永失真道真常之道悟者自得得悟道者常清靜矣仙翁葛祖曰吾得真道曾誦此經萬遍此經是天人所習不傳下士吾昔授之於東華帝君東華帝君授之於金闕帝君金闕帝君授之於西王母以上皆係口口相傳不記文字吾今於世書而録之上士悟之升為天官中士修之南宫列仙下士得之在世長年游行三界身入金門左玄真人曰學道之士持誦此經者即得十天善神擁護其身然後玉符保神金液鍊形形神俱妙與道合真正一真人曰人家有此經悟解之者灾障不干衆聖護門神升上界朝拜高真功滿德就相感帝君誦持不替身騰紫雲無上玉皇心印妙經上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日功靈默朝上帝一紀飛升知者易悟昧者難行履踐天光呼吸育清出玄入牝若亡若存綿綿不絶固蒂深根人各有精精合其神神合其氣氣合體真不得其真皆是强名神能入石神能飛形入水不溺入火不焚神依形生精依氣盈不凋不殘松柏青青三品一理妙不可聽其聚則有其散則零七竅相通竅竅光明聖日聖月照耀金庭一得永得自然身輕太和充溢骨散寒瓊得丹則靈不得則傾丹在身中非白非青誦持萬遍妙理自明九天應元雷聲普化天尊說玉樞寶經天尊言爾諸天人欲聞至道至道深𥥆不在其他爾既欲聞無聞者是無聞無見即是真道聞見亦泯惟爾而已爾尚非有何見於道不聞而聞何道可談天尊言道者以誠而入以默而守以柔而用用誠似愚用默似訥用柔似拙夫如是則可與忘形可與忘我可與忘忘入道者知止守道者知謹用道者知微能知微則慧光生能知謹則聖智全能知止則泰定安泰定安則聖智全聖智全則慧光生慧光生則與道為一是名真忘惟其忘而不忘忘無可忘無可忘者即是至道道在天地天地不知有情無情惟一無二天尊言吾今於世何以利生為諸天人演此妙寶得悟之者俾儕仙阼學道之士信有氣數夫風土不同則稟受自異故謂之氣智愚不同則清濁自異故謂之數數繫乎命氣繫乎天氣數所囿天命所梏若得真道愚可以智濁可以清惟命俾之愚昏昏濁冥冥亦風土稟受之移之天地神其機使人不知則曰自然使知其不知則亦曰自然自然之妙雖妙於知而所以妙則自乎不知然於道則未始有以愚之濁之諸天聞已四衆咸悅天尊言九天雷公將軍五方雷公將軍八方雲雷將軍五方蠻雷使者雷部總兵使者莫賺判官發號施令疾如風火有廟可伐有壇可擊有妖可除有祟可遣季世末法多諸巫覡邪法流行陰私魘禱是故上清乃有天延禁鬼録奸之庭帝猷束妖考邪之房能誦此經其應如響故此經者上通三天下徹九泉可以追薦魂爽超度祖玄太上遣素車白馬大將軍以監之孚佑上帝純陽吕祖天師心經吕帝曰天生萬物惟人最靈匪人能靈實心是靈心為主宰一身之君役使百骸區處羣情物無其物形無其形稟受於天良知良能氣拘欲蔽日失其真此心既失此身亦傾欲善其身先治其心治心如何即心治心以老老心治不孝心以長長心治不弟心以委致心治不忠心以誠恪心治不信心以恭敬心治無禮心以循理心治無義心以清介心治無廉心以自愛心治無恥心以積德心治為惡心以利濟心治殘賊心以匡扶心治傾陷心以仁慈心治暴戾心以謙遜心治敖慢心以損抑心治盈滿心以儉約心治驕奢心以勤愼心治怠忽心以坦夷心治危險心以忠厚心治刻薄心以和平心治忿恚心以寬洪心治褊窄心以傷身心治沉湎心以妻女心治姦淫心以果報心治謀奪心以禍患心治鬬狠心以正教心治異端心以至信心治大疑心以悠久心治無恆心以始終心治反覆心以施與心治慳吝心以自然心治勉强心以安分心治非望心以順受心治怨尤心以推誠心治猜忌心以鎮定心治搖惑心以中正心治偏袒心以大體心治細務心嗟乎人心不治不純如彼亂絲不理不清如彼古鏡不磨不明如彼劣馬不勒不馴我故說經欲治人心人心得治天地清寧偈曰一切惟心心最危範天圍地發光輝天心即在人心見人合天心天弗違人心皆散亂一念便純真欲求無上道大衆轉天尊玉皇赦罪天尊八十一遍雷聲普化天尊八十一遍向來誦經念念存誠千真拱聽萬聖通靈應元合氣普化分形九天有命三界遵行消灾懴罪祈福延生功圓行滿大道證盟𨚑祖懴悔文經功浩力難思議回向十方諸聖師願滌真心求懴悔河沙罪障悉消離懴悔我等自從曩劫乃至今生假火風地水以成形戀香味色聲而不悟貪嗔疾妬惡口妄言殺盜邪淫恣情縱欲逆辱父母悖負君師不敬天地神祗呵風罵雨不信罪福因果昧理欺心遂致報對升沉輪回展轉受諸苦惱無有休停皆由一念之差障迷自性妄認六塵之幻沉溺愛河今而既獲人身叨親正教豈非千生慶幸一旦遭逢自合省心早求度世若仍似前流蕩必竟迷失本來一墮冥途化為異類是當思沈淪苦發清淨心皈奉聖真特求懴悔乞憐愚昧原赦罪愆解釋報𡨚蠲消魔障所冀命逢昌運名注丹臺際遇真師親聞至道精修善行增長善芽勵志玄門怡神真境他日功成羽化或更行滿飛升廣看後學之成咸通宿命還證上乘之道承侍虛皇更願國安民豐時和歲稔願真風丕振道化興行願凶惡化賢邪魔歸正願兵刑悉錯囹圄空間願沉滯升遷𡨚讐和釋願參玄學者入道成真願纍劫宗親俱獲超度願厯世師友同證真常願所有眷緣增崇福慧願所傷物命早生人天願絶食葷酒不相殺害願持身端正不履淫邪願悉破慳貪永除險峻願言無誑妄行皆真誠願弱已饒人濳忍忿怒願慈心下氣恭敬一切願不履邊陲不墮邪見願結交仙友棲集真虛願智慧開明神通恢廓願廣行方便普濟羣生願永斷執迷咸歸至道塵劫有盡我願無窮端望帝真曲垂濟度皈命禮謝無上虛皇至真三寶三稱收讚全真演教正一垂科天仙法派吉祥多位育在中和道侣觀磨修煉永無魔大聖回光普照大天尊三稱三皈自皈依道當願衆生常侍天尊永脫輪回自皈依經當願衆生生生世世得聞正法自皈依師當願衆生學最上乘不落邪見午壇功課香讚晴空如蓋曦景當天上清午日萬方圓雲路淨無烟寶誥䖍宣悟道自升仙太上無極三寶大天尊三稱開誥偈祕書丹篆金𥳑龍文玄宗太始三境聿分九宸十極覆載靡垠諸天諸聖共建殊勳神仙代出道德馥芬淵源遞授傳派無紛煌煌玉誥慶奬風雲九天玄祖誥至心皈命禮南宫紫府無無上道開化玄極至真不壞真空元始靈源祖劫虛無體道妙用難窮實諸仙諸佛諸聖之宗神機莫測乃掌道掌法掌教之主至靈至感至聖至慈德溥無量浩劫救世定亂闡法能仁聖姥九天玄女真君大天尊玉清誥至心皈命禮一元之始萬道之宗鬱羅蕭臺玉山上京處上極無上大羅之境檀熾鈞音蒼胡頡寶總玄之又玄衆妙之門建立三才開張萬範凝三氣而結為三境初肇天根命九宸而位列九霄總司雷令大悲大願大聖大慈虛無自然元始天尊上清誥至心皈命禮居上清界號靈寶君祖劫化生九萬九千餘梵氣赤書煥發六百六十八真文因混沌赤文而開九霄紀元洞玉厯而分五