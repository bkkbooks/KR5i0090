body:
  text: 清微宏範道門功課清微宏範道門功課序竊以金書玉笈爲入道之門寶誥丹經乃修仙之路得其門可以復元眞之性由是路可以煉不壞之身是故羽士住叢林奉香火三千日裏行持十二時中課誦朝夕朝禮期上接夫聖眞夙夜輸誠祝永綿夫國祚不勤持誦何以保養元和不立科儀無以宏揚玄妙蓋經之爲經是前聖之心宗咒之爲咒乃上仙之妙法誦之誠則經明行之篤則法驗經明則道契於内法驗則神通於外經明法驗而兩全内功外行而俱足此陶鎔德性之階梯希求超證之寶筏也若能矢志專誠二六時中猛勇精進永無退轉在世端能出世居塵自可離塵出入虛無逍遙宇宙自由自在無滅無生方寸不染一塵妙用直超三界若此者了自心一念之塵根脫世上三途之苦厄履長生之大道渡苦海之洪濤禳災而災消祈福而福至無求不應有感皆通是惟誦持諸品仙經及羣眞寶號凡淨口淨心淨身而有咒安天安地安神而有章雖隨堂之功課實無上之熏修直候三千功滿八百行圓方是法門之上士玄觀之丈夫也爰爲鳩眾梓行永期流布庶使全眞道侣遵依科教信受奉行是爲序
