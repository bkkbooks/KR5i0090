立澍黎姥山書遺𢌿非同常語大雷琅咒施行克召天丁得長老之化裁證神通之妙境戴笠浮波立而不濡水銀入口融而成金大悲大願大聖大慈紫泥昭異隨光普度眞君修爲無礙天尊海瓊眞人白祖誥至心皈命禮弱冠求眞海南訪道淡心於金玉錦繡矢修於餐雪卧冰跣足蓬頭在在不隨俗貌飡霞服氣時時苦積貞修畫梅畫竹以自娛且飮且吟而弗倦風流自在道法無邊大悲大願大聖大慈紫清殿派神霄輔元眞君五雷演法天尊和惠大帝邱祖誥至心皈命禮寍海從眞龍門啟派修苦行於三千立玄綱於百世嘉謨入誥盡覺後之金針遺集垂科乃通玄之玉液長陽消陰生水濟火道高重於金元仙蹟留於蜀隴卓哉仙品偉矣洪仁大悲大願大聖大慈三天翼教承先啟後宗師接引大使虎符領道大夫雷霆行省通明上相宣德行化眞君通權達變和惠大帝全眞演教天尊長生眞人劉祖誥至心皈命禮孝友傳家善良邁種生兆紅霞入夢之祥瑞顯紫氣盤山之異擲傘騰空莫測來踪去跡度人已斃堪稱起死回生現海市於生醮之交放陽神於駙馬之獄神通累累道範超超大悲大願大聖大慈全眞廣教長生體道上仙崇修藴德天尊長眞眞人譚祖誥至心皈命禮金蓮種異玉葉兆祥幼稱不溺不焚長著克修克證忍辱鍊無明之火共識慈祥陽神現古廟之中羣欽道力書龜書蛇能使火不爲殃占斗占星更令水來知備大悲大願大聖大慈全眞嗣教長眞凝神上仙玄德崇教天尊丹陽眞人馬祖誥至心皈命禮伏波苗裔閬苑飛仙領袖諸眞爲重陽之高弟精融丹液開後學之津梁梳三髻以示誓不忘師戰千魔以能備臻大道惟一點丹田煖擁遂三千薄海神周濟度無窮靈奇莫罄大悲大願大聖大慈全眞領教丹陽抱一上仙無爲普化天尊太古眞人郝祖誥至心皈命禮靜穆修眞澄虛悟道少精周易隱跡卜筮之中長遇重陽猛省回頭之示窮年靜坐以爲功而水火之顚倒早就對人不語以爲養而虎龍之會合已成緣秘語之能參乃累功之克證高風自在遺範無邊大悲大願大聖大慈全眞翼教廣寍恬然上仙太古澄悟天尊玉陽眞人王祖誥至心皈命禮天姿純粹道力堅凝奉母而依至教結伴而事重陽識舊泉於荒蕪之間羣沾井惠施鐵鞭於當路之石共樂通衢獨立危崖九載躋身樂境三天形影療病謨誥稱嘉大悲大願大聖大慈全眞洪教玉陽卓犖上仙輔玄度物天尊不二元君孫祖誥至心皈命禮青霞繼派巾幗宗工生傳一鶴入抱之祥長適三髻聚頂之配棄家弗顧不作兒女之悲別洞隻修但篤煙雲之好始得重陽之開示繼從丹陽以琢磨先了證夫玄丹乃超昇乎羽谷何姥爲之提攜麻姑與爲伯仲大悲大願大聖大慈全眞體教清靜慧悟上仙女師領派元君宏教眞君柳祖誥至心皈命禮無上玄功玉樞妙果昭靈應於十方運慈心於一切開壇啟教賴洪力之護持濟困扶危建殊勳於烜赫受玉清元始之誥命贊九天應元之神功仁風遐暢宇宙藹春日之和祥光遍覆天人瞻慈雲而集道極無爲玄通莫測大悲大願至神至仁左輔元化無上極尊天仙二祖玉樞右宰宏教眞君宏濟眞君程祖誥至心皈命禮道融三教理會百家髫齡篤孝子之眞誠壯𡻕成忠臣之奇節艱難跋涉拱衞濳龍慷慨都俞擒縛孽虎得神禹之遺法平步可以凌空授玄祖之心傳飛劍還能蔽日綱維百世大儒者之宗風表率羣賢闡玄門之要訣雙修道法結小隱於黄山兩現神功留異形於白嶽利人濟物寶鼎鎔金飮酒賦詩珠編屑玉風流奇士節義神仙首領南宫協司東岱掌風雷之號令統丁甲天兵握陰陽之樞機管水火鬼卒大慈大願至聖至仁斗府總管雷部侍郎玉宸校書少宰丹霄簽判仙卿隆恩宏濟眞君王天君誥至心皈命禮先天主將一炁神君都天糾察大靈官三界無私猛烈將金睛朱髮號三五火車雷公鳳嘴銀牙統百萬𧴀貅神將飛騰雲霧號令雷霆降雨開晴驅邪治病觀過失於一十二年受命玉帝積功勳於百千萬種誓佐祖師至剛至勇濟死濟生方方闡教處處開壇豁落猛吏三五火車大靈官王天君馬天君誥至心皈命禮仰啟靈官馬元帥天機監簿上生君愍憐人世捉妖精化現法身施濟度背負火瓢威烜赫臂開金甲勢巍峩三頭磊落現霞光九目輝煌騰殺氣霧鎖藍身高大翠風飄朱髮散紅霞手執寶劍氣芒寒坐跨火犀聲哮吼撼動帝鐘天地驚鈴搖玉㦸鬼神愁法印照處木魈亡神箭射時流星落怒發火犀焚怪廟喜飛鐵索縛山魈八王猛將左右隨助道將軍前後衞白蛇威猛呑魔精考鬼無私行肅煞執法將軍從指顧六天火府爲噓呵立聞禮請望來臨大賜雷威加擁護收讚諸天列聖普駐雲光照臨下土降嘉祥紫炁鬱蒼茫朝禮無忘心地得清涼大聖回光普照大天尊三稱三皈自皈依道當願眾生常侍天尊永脫輪迴自皈依經當願眾生生生世世得聞正法自皈依師當願眾生學最上乘不落邪見晚壇功課香讚深沈宵漏寂靜遙天太清日月慶重圓常住結祥煙回向誠宣證道得飛仙太上無極三寶大天尊三稱開經偈大道洞玄虛有念無不契鍊質入仙眞遂成金剛體超度三界難地獄五苦解遵誦太上經虔誠稽首禮十方救苦天尊三稱種種無明是苦根苦根除盡善根存全憑慧劍威神力跳出輪迴入道門道以無無得妙身雙圓性命是修眞心入聖智通明地方是超昇得道人十方天尊妙難窮開化人天度眾生存亡兩途皆利濟眾等諷誦晚壇經一點光明路沈迷只自看玄門眞妙訣起死有金丹玄藴咒寂寂至無宗虛峙劫仭阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅眞人無上德世世爲仙家道藏眞經至尊最上諷誦䖍誠功德無量元始天尊說生天得道眞經爾時元始天尊在大羅天上玉京山中爲諸天仙眾說此生天得道眞經吿諸仙曰吾今爲汝畧啟身心明宣道要十方得道神仙皆從此經修行而通微奥善男子善女人依憑齋戒作是津梁一切有爲顯諸眞路體此法相乃可受持能屏眾緣永除染着外想不入内想不出於正念中乃得五臟清涼六腑調泰三百六十骨節之閒有諸滯礙十惡之業百八十煩惱之業眾苦罪緣悉皆除蕩卽引太和眞炁注潤身田五臟六腑心目内觀眞炁所有清淨光明虛白朗曜杳杳冥冥内外無事昏昏默默正達無爲古今常存總持靜念從茲解悟道力資扶法藥相助仍節飮食驅遣鬼尸安寂六根靜照八識空其五藴證妙三元得道成眞自然昇度爾時諸天仙眾上白天尊言自從無始以來至於今日未聞如是大乘經典我等緣茲幸會廣及一切道果圓明而說偈曰杳杳冥冥清靜道昏昏默默太虛蹤體性湛然無所住色心都寂一眞宗太上洞玄靈寶救苦妙經爾時救苦天尊徧滿十方界常以威神力救拔諸眾生得離於迷塗眾生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥煙塞死戸初發玄元始以通祥感機救一切罪度一切厄渺渺超仙源蕩蕩自然清皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙紫雲覆黄老是名三寶君還將上天炁以制九天魂救苦諸妙神善現救苦時天上混無分天炁歸一身皆成自然人自然有則體本在空洞中空洞寂非寂遍體皆虛空第一委炁立第二順炁生第三成萬法第四生光明天上三十六地下三十六太玄無邊際妙哉大洞經皈命太上尊能消一切罪東方玉寶皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方眞皇洞神天尊道言十方諸天尊其數如沙塵化形十方界普濟度天人委炁聚功德同聲救罪人罪人實可哀我今說妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成清署劍樹化爲騫上登朱陵府下入開光門超度三界難逕上元始天於是飛天神王無鞅聖眾瞻仰尊顏而作頌曰天尊說經教接引於羣生勤修學無爲悟眞道自成不迷亦不荒無我亦無名朗誦罪福句萬遍心垢清爾時飛天神王及諸仙眾說是頌畢稽首天尊奉辭而退太上道君說解𡨚拔罪妙經爾時太上道君與諸聖眾在八騫林下七寶臺中羅列威儀敷陳道要怡神默坐於玉京山放七寶光明照福堂地獄見福堂之内男女善人快樂無爲逍遙自在復見諸地獄之中饑鬼窮魂以日繼夜受種種苦惱悉無人形五體壞爛饑飡猛火渴飲鎔銅足履刀山身負鐵杖遍體流血悲號徹天是時會中有一眞人名曰廣信從座而起稽首前進上白道君曰不審此輩窮魂生有何咎而受茲苦道君曰受諸罪者在世之時不敬三光欺負神理十惡五逆不忠不仁不慈不孝毁傷物命殺害眾生福盡夀終當受斯苦是時廣信眞人心生哀憫欲施濟拔幸望妙力威光許令開度伏䝉道君垂賜金言廣設法要爲諸眾生演說是經名曰解𡨚拔罪流布於世利益存亡若有善男子善女人一心專志入靜持齋焚香行道六時轉念是經吾當隨願保佑其人使宿世𡨚讐乘福超度幽魂苦爽各獲超昇眞人廣信歡喜再拜覼縷勝因而作頌曰偉哉大道君常普無量功舟楫生死海濟度超羅酆罪對不復遇福報與冥通威神安可測讚之焉能窮是時廣信眞人與諸聖眾聞法將畢各各稽首皈依信受奉行太上玄靈斗姥大聖元君本命延生心經老君曰斗姥上靈光圓大天寶月中有騫樹色瑩琉璃玉兎長生搗煉大藥凡天地氣運休否日月星辰錯行雨暘晦明不時風寒暑濕不節亢旱水火疫癘凶灾至如刀兵蟲蝗妖精鬼怪疾病傷生爭訟横撓種種不祥悉皆乖氣所致斗姥降以大藥普垂醫治之功爕理五行升降二炁解滯去窒破暗除邪愆期者應期失度者得度安全胎育治療病疴潤益根荄暢回氣候生成人物煉度鬼魂散禳百結資補八陽輔正全眞召和延祚位尊斗姥職重天醫生諸天眾月之明爲北斗眾星之母斗爲之魄水爲之精主生人身光凝性水眾水一月眾月一光有情無情均秉靈光道炁一一資其生養獲衞恩深德重皆莫能知是以人生面有七竅内應乎心魄有七眞受魄於斗斗姥尊號曰九靈太妙白玉龜臺夜光金精祖母元君又曰中天梵炁斗姥元君紫光明哲慈惠太素元君金眞聖德天尊又化號大圓滿月光王又曰東華慈救皇君天醫大聖應號不一主治中天寶閣祖劫在玄明眞淨天修行玄靈妙道勤奉元始至尊慧香氤氲智燈朗耀每發至願願生聖子補裨造化統制乾坤願力堅固終始如一因沐浴於九曲華池中湧出白玉龜臺神獬寶座斗姥登於寶座之上怡養神眞修煉精魄沖然攝炁炁入玄玄運合靈風紫虛蔚勃果證玄靈妙道放無極微妙光明洞徹華池化生金蓮九苞經人閒七晝夜其華池中光明愈熾愈盛其光一時上騰九華天中化成九所大寶樓閣寶樓閣之中混凝九眞梵炁自然成章文曰鬼尊鬼帝鬼摩鬼尼鬼達𩳓魁鬼鉢鬼叱前有天罡光敷秘字文曰螭音痴鬼爾音其芒角炓音了然是九章生神應現九皇道體一曰天皇二曰紫微三曰貪狼四曰巨門五曰祿存六曰文曲七曰廉貞八曰武曲九曰破軍天皇紫微尊帝二星居斗口娑羅上宫眞光大如車輪得見之者身得長生位證眞仙永不輪轉二星分作餘暉爲左輔右弼爲擎羊陀羅神化無方總領玄黄正炁七元星君斡運陰陽造化功霑三界德潤羣生其功德力不可思議夫修煉九還七返大丹者持此頓悟玄關靈光現前三十九節自然生榮了證太玄三一之道知守本來具足之理堅固眞身更能精修大定乃至形神俱妙與道合眞飛昇玉京逍遙自在如此則劫劫生生玄祖宗親皆得解脫同受玄恩濟度存亡此爲深妙皈心持奉靜處璿璣内景無漏於六根外景不淪於萬有湛然清淨道在目前頂禮眞形恭敬咒曰玄靈節榮永保長生太玄三一守其眞形五臟神君各得安寍魁𩲃𩵄䰢魓𩳐魒鬼旭鬼呼急急如律令柳祖回向文伏以大道開天妙樞啟乾坤之秘玄宗肇始靈機握主宰之元九宸於以司衡十極因之定位由是而三才立由是而萬法生逮太上化起乎東華爲道門首出之北祖正陽嗣響冠八洞之仙班吕帝垂慈開兩宗之法派南推五祖北有七眞稽仙系於寶笈琅圅震愚迷以晨鐘暮鼓緬懷崇範敬𤑔心香伏念兆等根塵未解動結愆尤聲色甫逢每生貪染脫非三洞之眞文何洗多生之夙垢茲幸棲身常住仰對至尊悟幻軀之無常急覓眞常之路信長生之可學力臻絕學之奇道誡爲先何堪錯步時光易逝幸早回頭一志常持定吉祥兮止止三時朝禮恒晝夜以行行所祈障礙滌除功修圓滿眞光普照道果速成永守一編允矣天仙秘典留傳萬世慈哉妙道心鐙爲上良因再申稱念太乙救苦天尊八十一聲純陽妙道天尊八十一聲一願風調雨順二願五穀豐登三願皇王萬𡻕四願國土清平五願民安物阜六願福夀康寍七願灾消禍散八願水火無侵九願聰明智慧十願學道成眞十一願諸神擁護十二願亡者超昇四生六道一切含靈聞經聽法總得超昇願滅三障諸煩惱願得智慧眞明了普願災障悉消除世世常行無上道罪從心起將心滅心若滅時罪亦亡罪亡心滅兩俱空是則名爲眞懴悔至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨眞一不二法門大悲大願大聖大慈先天教主元始天尊至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨眞一不二法門大悲大願大聖大慈玄中教主靈寶天尊至心皈命禮太上三寶一切諸天九十九億九萬九千十方國土厯劫度人清淨眞一不二法門大悲大願大聖大慈混元教主道德天尊收讚時分二六功滿日中吉祥智果妙飛翀秘密在眞空古觀高崇大道合蒼穹大聖回光普照大天尊三稱三皈自皈依道當願眾生常侍天尊永脫輪迴自皈依經當願眾生生生世世得聞正法自皈依師當願眾生學最上乘不落邪見
